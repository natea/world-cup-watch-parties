<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1fa85a"/>
      <stop offset="1" stop-color="#0b6e3b"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#pitch)"/>
  <!-- faint pitch center circle -->
  <circle cx="512" cy="512" r="430" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="10"/>
  <!-- ball -->
  <circle cx="512" cy="512" r="330" fill="#ffffff" stroke="#0d0d0d" stroke-width="10"/>
  <!-- seams from the central pentagon vertices out to the rim -->
  <g stroke="#0d0d0d" stroke-width="18" stroke-linecap="round">
    <line x1="512" y1="392" x2="512" y2="194"/>
    <line x1="626.1" y1="474.9" x2="814.4" y2="413.7"/>
    <line x1="582.5" y1="609.1" x2="699" y2="769.3"/>
    <line x1="441.5" y1="609.1" x2="325" y2="769.3"/>
    <line x1="397.9" y1="474.9" x2="209.6" y2="413.7"/>
  </g>
  <!-- central black pentagon -->
  <polygon points="512,392 626.1,474.9 582.5,609.1 441.5,609.1 397.9,474.9" fill="#0d0d0d"/>
</svg>

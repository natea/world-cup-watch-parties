# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys three resources from this repo:
#   1. worldcup-api  — Django + DRF API (gunicorn), default *.onrender.com URL
#   2. worldcup-web  — React/Vite static site, custom domain worldcup.stagehopper.app
#   3. worldcup-db   — managed PostgreSQL
#
# First deploy:  Render Dashboard → New → Blueprint → pick this repo.
# Then add the custom domain to worldcup-web (Settings → Custom Domains) and
# point worldcup.stagehopper.app at it via the CNAME Render shows you.

databases:
  - name: worldcup-db
    plan: free
    databaseName: worldcup
    user: worldcup

services:
  # ---- Django API -----------------------------------------------------------
  - type: web
    name: worldcup-api
    runtime: python
    plan: free
    repo: https://github.com/natea/world-cup-watch-parties
    buildCommand: "./build.sh"
    startCommand: "uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: WEB_CONCURRENCY
        value: "4"
      # Browsers calling the API from the static front end (custom domain +
      # the default static-site URL, handy before DNS propagates).
      - key: CORS_ALLOWED_ORIGINS
        value: "https://worldcup.stagehopper.app,https://worldcup-web.onrender.com"
      # Lets the admin / browsable API accept the custom front-end origin too.
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://worldcup.stagehopper.app"

  # ---- React / Vite static site --------------------------------------------
  - type: web
    name: worldcup-web
    runtime: static
    rootDir: frontend
    buildCommand: 'npm install && VITE_API_BASE="https://$API_HOST/api" npm run build'
    staticPublishPath: ./dist
    domains:
      - worldcup.stagehopper.app
    envVars:
      # Build-time only: the API service's hostname → VITE_API_BASE.
      - key: API_HOST
        fromService:
          type: web
          name: worldcup-api
          property: host
    routes:
      # SPA fallback so client-side routes resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html

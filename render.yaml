# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys three resources from this repo:
#   1. worldcup-api  — Django + DRF API (gunicorn), default *.onrender.com URL
#   2. worldcup-web  — React/Vite static site, custom domain worldcup.stagehopper.app
#   3. worldcup-db   — managed PostgreSQL
#
# First deploy:  Render Dashboard → New → Blueprint → pick this repo.
# Then add the custom domain to worldcup-web (Settings → Custom Domains) and
# point worldcup.stagehopper.app at it via the CNAME Render shows you.

databases:
  - name: worldcup-db
    plan: free
    databaseName: worldcup
    user: worldcup

services:
  # ---- Django API -----------------------------------------------------------
  - type: web
    name: worldcup-api
    runtime: python
    plan: free
    repo: https://github.com/natea/world-cup-watch-parties
    buildCommand: "./build.sh"
    startCommand: "uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: WEB_CONCURRENCY
        value: "4"
      # Browsers calling the API from the static front end (custom domain +
      # the default static-site URL, handy before DNS propagates).
      - key: CORS_ALLOWED_ORIGINS
        value: "https://worldcup.stagehopper.app,https://worldcup-web.onrender.com"
      # Lets the admin / browsable API accept the custom front-end origin too.
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://worldcup.stagehopper.app"

  # ---- React / Vite static site --------------------------------------------
  - type: web
    name: worldcup-web
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    domains:
      - worldcup.stagehopper.app
    envVars:
      # Public API URL, inlined into the bundle at build time by Vite.
      # NOTE: do NOT use `fromService property: host` here — for a web service
      # that returns the *internal* private-network name (no .onrender.com),
      # which the browser can't resolve. Render also appended a random suffix
      # to the API service, so this is its real public URL.
      - key: VITE_API_BASE
        value: https://worldcup-api-y9t7.onrender.com/api
      # Umami (cloud) visitor analytics. The website ID is a public client-side
      # identifier (it ships in the page), so it's fine to commit. Inlined into
      # the bundle at build time; left unset → no analytics loaded.
      - key: VITE_UMAMI_WEBSITE_ID
        value: 617c3de3-2795-4dbf-8ac4-c03389244601
    routes:
      # SPA fallback so client-side routes resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html
